  'qa': 'shield-check', 'q-a': 'shield-check', 'quality': 'shield-check', 'tester': 'shield-check', 'validator': 'shield-check',
  'git': 'git-branch', 'git-agent': 'git-branch', 'vcs': 'git-branch',
  'chronicler': 'notebook', 'observer': 'notebook', 'logger': 'notebook',
  'gurvinder': 'terminal', 'operator': 'terminal', 'admin': 'terminal', 'root': 'terminal',
};

const ROLE_COLOR_MAP = {
  'supervisor': '#b388ff', 'lead': '#b388ff', 'director': '#b388ff',
  'engineer': '#448aff', 'builder': '#448aff', 'developer': '#448aff', 'coder': '#448aff', 'dev': '#448aff',
  'scout': '#18ffff', 'researcher': '#18ffff', 'investigator': '#18ffff',
  'qa': '#ff5252', 'q-a': '#ff5252', 'quality': '#ff5252', 'tester': '#ff5252', 'validator': '#ff5252',
  'git': '#ffd740', 'git-agent': '#ffd740', 'vcs': '#ffd740',
  'chronicler': '#ff80ab', 'observer': '#ff80ab', 'logger': '#ff80ab',
  'gurvinder': '#ff9100', 'operator': '#ff9100',
};

const EXTRA_COLOR_SWATCHES = ['#64ffda', '#b9f6ca', '#ff6e40', '#8c9eff', '#ffcc80', '#84ffff', '#f48fb1', '#ce93d8'];

function resolveAgentIcon(agent) {
  if (agent.icon && AVATAR_ICONS[agent.icon]) return agent.icon;
  const name = (agent.name || '').toLowerCase();
  for (const [kw, icon] of Object.entries(ROLE_ICON_MAP)) {
    if (name.includes(kw)) return icon;
  }
  return 'robot';
}

function resolveAgentColor(agent) {
  if (agent.color) return agent.color;
  const name = (agent.name || '').toLowerCase();
  for (const [kw, c] of Object.entries(ROLE_COLOR_MAP)) {
    if (name.includes(kw)) return c;
  }
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash + name.charCodeAt(i)) | 0;
  return EXTRA_COLOR_SWATCHES[Math.abs(hash) % EXTRA_COLOR_SWATCHES.length];
}

function renderAvatarCircle(agent, size) {
  size = size || 40;
  const iconSize = Math.round(size * 0.55);
  const iconKey = resolveAgentIcon(agent);
  const agentColor = resolveAgentColor(agent);
  const svgHtml = AVATAR_ICONS[iconKey] || AVATAR_ICONS['robot'];
  return `<div class="agent-avatar" style="width:${size}px;height:${size}px;min-width:${size}px;background:${agentColor}"><div class="agent-avatar-icon" style="width:${iconSize}px;height:${iconSize}px">${svgHtml}</div></div>`;
}



let ws = null;
let agentData = {};
let agentRoster = [];
const agentHookEvents = {};  // { agentName: { tool: { exit_code, summary, timestamp } } }

const $ = id => document.getElementById(id);
const $msgs = $('messages'), $input = $('msgInput'), $send = $('sendBtn');
const $target = $('targetSel'), $conn = $('connBadge'), $agents = $('agentList'), $count = $('agentCount');

// ═══════════ WebSocket ═══════════
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => { $conn.textContent = 'live'; $conn.className = 'conn on'; $send.disabled = false; };
  ws.onclose = () => { $conn.textContent = 'offline'; $conn.className = 'conn off'; $send.disabled = true; setTimeout(connect, 2000); };
  ws.onerror = () => ws.close();
  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);
    if (d.type === 'history') { $msgs.innerHTML = ''; lastSender = null; lastTimestamp = null; d.messages.forEach(renderMsg); scrollForce(); }
    else if (d.type === 'message') { renderMsg(d.message); scrollEnd(); }
    else if (d.type === 'agent_status') {
      if (d.server) {
        const srvUp = $('srvUptime');
        const srvLA = $('srvLA');
        if (srvUp) srvUp.textContent = d.server.uptime || '--';
        if (srvLA) {
          srvLA.textContent = d.server.launchagent ? 'active' : 'not installed';
          srvLA.className = d.server.launchagent ? 'server-la-active' : 'server-la-inactive';
        }
      }
      const incoming = d.agents || {};
      // Preserve dynamic flag from previous data
      for (const name in incoming) {
        if (agentData[name] && agentData[name].dynamic) incoming[name].dynamic = true;
      }
      agentData = incoming;
      // Update COLORS map from agent identity system
      agentRoster.forEach(a => {
        const c = (typeof resolveAgentColor === 'function') ? resolveAgentColor(a) : null;
        if (c) COLORS[a.name] = c;
      });
      renderAgents();
    }
    else if (d.type === 'membership') { if (agentData[d.agent]) agentData[d.agent].in_room = d.in_room; renderAgents(); }
    else if (d.type === 'agent_created') {
      const a = d.agent;
      if (!agentRoster.find(x => x.name === a.name)) {
        agentRoster.push({ name: a.name, role: a.role, dynamic: true });
      }
      agentData[a.name] = { presence: a.presence || 'offline', activity: a.activity || null, in_room: a.in_room !== false, dynamic: true };
      renderAgents();
    }
    else if (d.type === 'agent_removed') {
      agentRoster = agentRoster.filter(x => x.name !== d.agent);
      delete agentData[d.agent];
      renderAgents();
    }
    else if (d.type === 'hook_event') {
      if (!agentHookEvents[d.agent]) agentHookEvents[d.agent] = {};
      agentHookEvents[d.agent][d.tool] = { exit_code: d.exit_code, summary: d.summary, timestamp: d.timestamp };
      updateAgentGateStatus(d.agent);
    }
  };
}

// ═══════════ Messages ═══════════
let lastSender = null;
let lastTimestamp = null;

function formatTimeDivider(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const msgDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const diffDays = Math.floor((today - msgDay) / 86400000);

  if (diffDays === 0) return 'Today';
  if (diffDays === 1) return 'Yesterday';
  const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]}`;
}

function formatTimeShort(dateStr) {
  const d = new Date(dateStr);
  let h = d.getHours();
  const m = String(d.getMinutes()).padStart(2, '0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${m} ${ampm}`;
}

function shouldShowTimeDivider(prevTs, currTs) {
  if (!prevTs || !currTs) return false;
  const prev = new Date(prevTs);
  const curr = new Date(currTs);
  if (prev.toDateString() !== curr.toDateString()) return true;
  return (curr - prev) > 300000;
}

function isSameGroup(prevSender, prevTs, currSender, currTs) {
  if (prevSender !== currSender) return false;
  if (!prevTs || !currTs) return false;
  return (new Date(currTs) - new Date(prevTs)) < 20000;
}

function renderMsg(m) {
  const isSystem = m.type === 'system';
  const isDirect = !isSystem && m.target !== 'all';
  const isUser = !isSystem && m.sender === 'gurvinder';
  const isMobile = window.innerWidth < 768;

  // Time divider check (mobile only)
  if (isMobile && !isSystem && m.timestamp && shouldShowTimeDivider(lastTimestamp, m.timestamp)) {
    const divider = document.createElement('div');
    divider.className = 'time-divider';
    const dividerText = formatTimeDivider(m.timestamp);
    const timeText = formatTimeShort(m.timestamp);
    divider.textContent = dividerText === 'Today' ? timeText : `${dividerText} ${timeText}`;
    $msgs.appendChild(divider);
  }

  const el = document.createElement('div');

  if (isSystem) {
    el.className = 'msg system';
    el.textContent = m.content;
    lastSender = null;
    lastTimestamp = m.timestamp || null;
    $msgs.appendChild(el);
    return;
  }

  // Grouping logic
  const grouped = isSameGroup(lastSender, lastTimestamp, m.sender, m.timestamp);

  // Build class list
  let cls = 'msg';
  if (isUser && isMobile) cls += ' msg-user';
  if (isDirect) cls += ' direct';
  if (grouped) {
    cls += ' grouped';
    const prev = $msgs.lastElementChild;
    if (prev && prev.classList.contains('standalone')) {
      prev.classList.remove('standalone');
      prev.classList.add('group-start');
    }
  } else {
    cls += ' standalone';
  }
  el.className = cls;

  // Border color for agent messages
  if (!isUser || !isMobile) {
    el.style.borderLeftColor = color(m.sender);
  }

  // Timestamp
  const ts = m.timestamp ? m.timestamp.slice(11, 19) : '';
  const tag = isDirect ? `<span class="msg-tag">@${esc(m.target)}</span>` : '';

  // Build inner HTML
  let html = '';
  html += `<div class="msg-head">`;
  html += `<span class="msg-sender" style="color:${color(m.sender)}">${esc(m.sender)}</span>`;
  html += tag;
  html += `<span class="msg-time">${ts}</span>`;
  html += `</div>`;
  html += `<div class="msg-body">${esc(m.content)}</div>`;

  // User messages on mobile get timestamp below the bubble
  if (isUser && isMobile) {
    const shortTime = m.timestamp ? formatTimeShort(m.timestamp) : ts;
    html += `<span class="msg-time-below">${shortTime}</span>`;
  }

  el.innerHTML = html;

  lastSender = m.sender;
  lastTimestamp = m.timestamp || null;

  $msgs.appendChild(el);

  // Image preview for uploaded files
  if (m.content && m.content.includes('[uploaded:')) {
    const match = m.content.match(/\[uploaded:\s*([^\]]+)\]/);
    if (match) {
      const filePath = match[1].trim();
      const ext = filePath.split('.').pop().toLowerCase();
      if (['png', 'jpg', 'jpeg', 'gif', 'webp'].includes(ext)) {
        const img = document.createElement('img');
        img.src = `/uploads/${filePath.replace('docs/warroom-uploads/', '')}`;
        img.style.cssText = 'max-width:100%;max-height:300px;border-radius:8px;margin-top:8px;cursor:pointer;display:block';
        img.onclick = () => window.open(img.src, '_blank');
        const body = el.querySelector('.msg-body');
        if (body) body.appendChild(img);
      }
    }
  }
}

// ═══════════ Agent Sidebar ═══════════
const ROLE_MAP = {
  'supervisor': 'Coordinator',
  'scout': 'Research',
  'engineer-1': 'Engineer',
  'engineer-2': 'Engineer',
  'qa': 'Quality Gate',
  'git-agent': 'Git Ops',
  'chronicler': 'Observer',
};

function shortRole(role, name) {
  if (!role) return '';
  if (ROLE_MAP[name]) return ROLE_MAP[name];
  return role.length > 24 ? role.slice(0, 24) + '...' : role;
}

function renderAgents() {
  $agents.innerHTML = '';
  let inCount = 0;

  // Gurvinder — operator card, visually distinct
  const gCard = document.createElement('div');
  gCard.className = 'ac ac-operator';
  gCard.innerHTML = `
    <div class="ac-row1">
      ${renderAvatarCircle({name: 'gurvinder'}, 28)}
      <span class="dot active"></span>
      <span class="ac-name" style="color:${resolveAgentColor({name: 'gurvinder'})}">gurvinder</span>
    </div>
    <div class="ac-row2">
      <span class="ac-role">Operator</span>
    </div>
  `;

  // Card-level avatar (visible on mobile, hidden on desktop via CSS)
  gCard.insertAdjacentHTML('afterbegin', renderAvatarCircle({name: 'gurvinder'}, 40));

  // Mobile card body (visible on mobile, hidden on desktop)
  const gMobileHtml = `
    <div class="mobile-card-body">
      <div class="mobile-card-info">
        <div class="mobile-card-name" style="color:${resolveAgentColor({name: 'gurvinder'})}">gurvinder</div>
        <div class="mobile-card-role">Operator</div>
      </div>
      <div class="mobile-card-status">
        <div class="mobile-status-row">
          <span class="mobile-status-dot active"></span>
          <span class="mobile-status-word active">online</span>
        </div>
      </div>
    </div>
  `;
  gCard.insertAdjacentHTML('beforeend', gMobileHtml);

  gCard.onclick = () => { $target.value = 'all'; $input.focus(); };
  $agents.appendChild(gCard);
  inCount++;

  // Separator between operator and agents
  const sep = document.createElement('div');
  sep.className = 'ac-sep';
  $agents.appendChild(sep);

  // Split agents into active and de-boarded
  const activeAgents = [];
  const deboardedAgents = [];
  agentRoster.forEach(a => {
    const d = agentData[a.name] || {};
    const inRoom = d.in_room !== undefined ? d.in_room : true;
    if (inRoom) activeAgents.push(a);
    else deboardedAgents.push(a);
  });

  // ── ACTIVE AGENTS ──
  activeAgents.forEach(a => {
    const d = agentData[a.name] || {};
    const presence = d.presence || 'offline';
    const activity = d.activity || null;
    const role = shortRole(a.role, a.name);
    const task = d.task || null;
    const progress = d.progress != null ? d.progress : null;
    const eta = d.eta || null;
    const blockedBy = d.blocked_by || null;
    const blockedReason = d.blocked_reason || null;
    const stalled = d.stalled || false;
    const stalledMin = d.stalled_minutes || 0;
    const lastCommit = d.last_commit || null;
    const isDynamic = a.dynamic || d.dynamic || false;

    const sessionAlive = d.session_alive !== false;
    const sessionDead = !sessionAlive && presence === 'offline';

    if (presence !== 'offline') inCount++;

    let cardClass = 'ac';
    if (sessionDead) cardClass = 'ac session-dead';
    else if (blockedBy) cardClass = 'ac blocked-card';
    else if (stalled) cardClass = 'ac stalled';

    const card = document.createElement('div');
    card.className = cardClass;

    let dotClass = blockedBy ? 'offline' : (stalled ? 'busy' : presence);

    let stBadge = '';
    if (blockedBy) stBadge = '<span class="ac-status st-deboarded">blocked</span>';
    else if (stalled) stBadge = `<span class="ac-status st-busy">stalled ${stalledMin}m</span>`;
    else if (presence === 'busy') stBadge = '<span class="ac-status st-busy">working</span>';
    else if (presence === 'typing') stBadge = '<span class="ac-status st-typing">thinking</span>';
    else if (presence === 'offline') stBadge = '<span class="ac-status st-offline">offline</span>';

    let btns = '';
    if (sessionDead) {
      btns = `<button class="abtn abtn-recover" data-action="recover" data-agent="${a.name}">Recover</button>`;
    } else {
      btns = `
        <button class="abtn abtn-cli" data-action="attach" data-agent="${a.name}" title="Open CLI in Terminal">cli</button>
        <button class="abtn abtn-msg" data-action="msg" data-agent="${a.name}" title="Direct message">@</button>
        <button class="abtn abtn-off" data-action="deboard" data-agent="${a.name}" title="De-board from room">x</button>
      `;
    }

    let actLine = '';
    if (task) actLine = `<div class="ac-activity">${esc(task)}</div>`;
    else if (activity) actLine = `<div class="ac-activity ${presence === 'typing' ? 'tp' : ''}">${esc(activity)}</div>`;

    let progressHtml = '';
    if (progress != null) {
      const etaText = eta ? ` · ~${esc(eta)}` : '';
      progressHtml = `<div class="ac-progress"><div class="ac-progress-bar"><div class="ac-progress-fill" style="width:${progress}%"></div></div><span class="ac-progress-text">${progress}%${etaText}</span></div>`;
    }

    let blockerHtml = '';
    if (blockedBy) blockerHtml = `<div class="ac-blocker">⚠ blocked: ${esc(blockedReason || blockedBy)}</div>`;

    let stalledHtml = '';
    if (stalled && !blockedBy) stalledHtml = `<div class="ac-stalled-text">${stalledMin}m+ on same file</div>`;

    let deadHtml = '';
    if (sessionDead) deadHtml = '<div class="ac-dead-warning">\u26A0 Session lost \u2014 click Recover to restart</div>';

    let commitHtml = '';
    if (lastCommit) commitHtml = `<div class="ac-commit">${esc(lastCommit.hash)} ${esc(lastCommit.message)}</div>`;

    const dynBadge = isDynamic ? '<span class="ac-dynamic" title="Dynamic agent">~</span>' : '';

    const agentColor = resolveAgentColor(a);
    card.innerHTML = `
      <div class="ac-row1">
        <span class="ac-drag-handle" title="Drag to reorder">⠿</span>
        ${renderAvatarCircle(a, 28)}
        <span class="dot ${dotClass}"></span>
        <span class="ac-name" style="color:${agentColor}">${a.name}${dynBadge}</span>
        <div class="ac-actions">${btns}</div>
      </div>
      <div class="ac-row2">
        <span class="ac-role" title="${esc(a.role || '')}">${role}</span>
        ${stBadge}
      </div>
      ${actLine}${progressHtml}${blockerHtml}${stalledHtml}${deadHtml}${commitHtml}
      <div class="ac-gates"></div>
    `;

    // Card-level avatar (mobile)
    card.insertAdjacentHTML('afterbegin', renderAvatarCircle(a, 40));

    // Mobile card body
    const PRESENCE_LABELS = { active: 'active', busy: 'working', typing: 'thinking', session: 'no claude', offline: 'offline' };
    const presenceLabel = blockedBy ? 'blocked' : (stalled ? `stalled ${stalledMin}m` : (PRESENCE_LABELS[presence] || presence));
    const presenceClass = blockedBy ? 'offline' : (stalled ? 'busy' : presence);

    const mobileHtml = `
      <div class="mobile-card-body">
        <div class="mobile-card-info">
          <div class="mobile-card-name" style="color:${agentColor}">${a.name}</div>
          <div class="mobile-card-role">${role || ''}</div>
        </div>
        <div class="mobile-card-status">
          <div class="mobile-status-row">
            <span class="mobile-status-dot ${presenceClass}"></span>
            <span class="mobile-status-word ${presenceClass}">${presenceLabel}</span>
          </div>
        </div>
      </div>
    `;
    card.insertAdjacentHTML('beforeend', mobileHtml);

    // Mobile tap handler — open action bottom sheet
    if (window.innerWidth < 768) {
      card.onclick = (e) => {
        if (e.target.closest('.abtn')) return;
        showBottomSheet(a.name.toUpperCase(), [
          { icon: SVG_ICONS.chat, label: 'Message', action: 'msg' },
          { icon: SVG_ICONS.eye, label: 'View Activity', action: 'activity' },
          { icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>', label: 'Details', action: 'details' },
        ], (item) => {
          if (item.action === 'msg') {
            $target.value = a.name;
            if ($inputTarget) $inputTarget.textContent = `@${a.name} ▼`;
            switchTab('chat');
            $input.focus();
          } else if (item.action === 'activity') {
            const actItems = [];
            actItems.push({ label: `Presence: ${presenceLabel}` });
            if (activity) actItems.push({ label: `Activity: ${activity}` });
            if (task) actItems.push({ label: `Task: ${task}` });
            if (lastCommit) actItems.push({ label: `Commit: ${lastCommit.hash} ${lastCommit.message}` });
            showBottomSheet('Activity — ' + a.name, actItems, () => {});
          } else if (item.action === 'details') {
            const detItems = [];
            detItems.push({ label: `Role: ${a.role || 'none'}` });
            if (a.instructions) detItems.push({ label: `Instructions: ${a.instructions}` });
            detItems.push({ label: `Type: ${a.role_type || a.name}` });
            showBottomSheet('Details — ' + a.name, detItems, () => {});
          }
        });
      };
    }

    // Drag handle for reordering
    card.draggable = true;
    card.dataset.agentName = a.name;

    card.addEventListener('dragstart', (e) => {
      // Only allow drag from the handle
      if (!e.target.closest('.ac-drag-handle') && e.target.closest('.ac')) {
        // Check if the drag started on the handle
        const handle = card.querySelector('.ac-drag-handle');
        const rect = handle.getBoundingClientRect();
        if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) {
          // Not from handle — check if it's a file drop (allow that)
          if (!e.dataTransfer.types.includes('application/x-warroom-file')) {
            e.dataTransfer.setData('application/x-warroom-reorder', a.name);
            card.classList.add('reorder-dragging');
          }
          return;
        }
      }
      e.dataTransfer.setData('application/x-warroom-reorder', a.name);
      e.dataTransfer.effectAllowed = 'move';
      card.classList.add('reorder-dragging');
    });

    card.addEventListener('dragend', () => {
      card.classList.remove('reorder-dragging');
      // Clean up all reorder-over indicators
      document.querySelectorAll('.reorder-over').forEach(el => el.classList.remove('reorder-over'));
    });

    card.addEventListener('dragover', (e) => {
      if (e.dataTransfer.types.includes('application/x-warroom-reorder')) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        card.classList.add('reorder-over');
      }
    });

    card.addEventListener('dragleave', () => {
      card.classList.remove('reorder-over');
    });

    card.addEventListener('drop', (e) => {
      card.classList.remove('reorder-over');
      const draggedName = e.dataTransfer.getData('application/x-warroom-reorder');
      if (draggedName && draggedName !== a.name) {
        e.preventDefault();
        e.stopPropagation();
        // Reorder agentRoster
        const fromIdx = agentRoster.findIndex(r => r.name === draggedName);
        const toIdx = agentRoster.findIndex(r => r.name === a.name);
        if (fromIdx !== -1 && toIdx !== -1) {
          const [moved] = agentRoster.splice(fromIdx, 1);
          agentRoster.splice(toIdx, 0, moved);
          // Save order to localStorage
          localStorage.setItem('warroom-agent-order', JSON.stringify(agentRoster.map(r => r.name)));
          renderAgents();
        }
      }
    });

    card.querySelector('.ac-name').onclick = (e) => { e.stopPropagation(); $target.value = a.name; $input.focus(); };
    card.querySelectorAll('.abtn[data-action]').forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const action = btn.dataset.action;
        const agent = btn.dataset.agent;
        if (action === 'attach') fetch(`/api/agents/${agent}/attach`, { method: 'POST' });
        else if (action === 'deboard') fetch(`/api/agents/${agent}/deboard`, { method: 'POST' });
        else if (action === 'msg') {
          $target.value = agent;
          if ($inputTarget) $inputTarget.textContent = `@${agent} ▼`;
          $input.focus();
          if (window.innerWidth < 768) switchTab('chat');
        }
        else if (action === 'recover') {
          btn.textContent = 'Recovering...';
          btn.disabled = true;
          fetch(`/api/agents/${agent}/recover`, { method: 'POST' }).then(r => r.json()).then(d => {
            btn.textContent = d.status === 'recovered' ? 'Recovered!' : 'Failed';
            if (d.error) alert(d.error);
          }).catch(() => { btn.textContent = 'Failed'; });
        }
      };
    });

    // Drop zone: file → agent card
    card.addEventListener('dragover', (e) => {
      if (e.dataTransfer.types.includes('application/x-warroom-file')) {
        e.preventDefault();
        card.classList.add('drop-active');
      }
    });
    card.addEventListener('dragleave', () => {
      card.classList.remove('drop-active');
    });
    card.addEventListener('drop', (e) => {
      e.preventDefault();
      card.classList.remove('drop-active');
      const filePath = e.dataTransfer.getData('application/x-warroom-file');
      if (filePath) {
        $target.value = a.name;
        $input.value = `[file: ${filePath}] `;
        $input.focus();
      }
    });

    $agents.appendChild(card);

    // Restore gate status from tracked events
    if (agentHookEvents[a.name]) {
      setTimeout(() => updateAgentGateStatus(a.name), 0);
    }
  });

  // ── DE-BOARDED SECTION ──
  if (deboardedAgents.length > 0) {
    const deSep = document.createElement('div');
    deSep.className = 'ac-sep';
    $agents.appendChild(deSep);

    const deHeader = document.createElement('div');
    deHeader.className = 'sb-section-head';
    deHeader.textContent = `De-boarded (${deboardedAgents.length})`;
    $agents.appendChild(deHeader);

    deboardedAgents.forEach(a => {
      const role = shortRole(a.role, a.name);
      const isDynamic = a.dynamic || (agentData[a.name] && agentData[a.name].dynamic) || false;
      const dynBadge = isDynamic ? '<span class="ac-dynamic" title="Dynamic agent">~</span>' : '';

      const card = document.createElement('div');
      card.className = 'ac off';
      card.innerHTML = `
        <div class="ac-row1">
          <span class="dot session"></span>
          <span class="ac-name" style="color:${color(a.name)}">${a.name}${dynBadge}</span>
          <div class="ac-actions">
            <button class="abtn abtn-on" data-action="reboard" data-agent="${a.name}" title="Re-join the war room">+ rejoin</button>
            <button class="abtn abtn-remove" data-action="remove" data-agent="${a.name}" title="Kill session and remove permanently">remove</button>
          </div>
        </div>
        <div class="ac-row2">
          <span class="ac-role" title="${esc(a.role || '')}">${role}</span>
          <span class="ac-status st-deboarded">de-boarded</span>
        </div>
      `;

      // Card-level avatar + mobile body for de-boarded agents too
      card.insertAdjacentHTML('afterbegin', renderAvatarCircle(a, 40));
      const dMobileHtml = `
        <div class="mobile-card-body">
          <div class="mobile-card-info">
            <div class="mobile-card-name" style="color:${resolveAgentColor(a)}">${a.name}</div>
            <div class="mobile-card-role">${shortRole(a.role, a.name) || 'de-boarded'}</div>
          </div>
          <div class="mobile-card-status">
            <div class="mobile-status-row">
              <span class="mobile-status-dot offline"></span>
              <span class="mobile-status-word offline">offline</span>
            </div>
          </div>
        </div>
      `;
      card.insertAdjacentHTML('beforeend', dMobileHtml);

      card.querySelectorAll('.abtn[data-action]').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const action = btn.dataset.action;
          const agent = btn.dataset.agent;
          if (action === 'reboard') fetch(`/api/agents/${agent}/reboard`, { method: 'POST' });
          else if (action === 'remove') {
            if (confirm(`Remove ${agent} permanently? This will kill the tmux session.`)) {
              fetch(`/api/agents/${agent}/remove`, { method: 'DELETE' }).then(() => {
                agentRoster = agentRoster.filter(r => r.name !== agent);
                delete agentData[agent];
                renderAgents();
              });
            }
          }
        };
      });

      $agents.appendChild(card);
    });
  }

  // Update count
  $count.textContent = `${inCount} / ${agentRoster.length + 1}`;

  // Update target dropdown
  const cur = $target.value;
  $target.innerHTML = '<option value="all">@all</option>';
  agentRoster.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a.name;
    opt.textContent = `@${a.name}`;
    $target.appendChild(opt);
  });
  $target.value = cur || 'all';
}

// ═══════════ Agent Gate Status ═══════════
function updateAgentGateStatus(agentName) {
  const card = document.querySelector(`.ac[data-agent-name="${agentName}"]`);
  if (!card) return;

  const events = agentHookEvents[agentName] || {};

  // Update gate dots
  let gatesEl = card.querySelector('.ac-gates');
  if (!gatesEl) {
    gatesEl = document.createElement('div');
    gatesEl.className = 'ac-gates';
    card.appendChild(gatesEl);
  }

  gatesEl.innerHTML = '';
  for (const [tool, ev] of Object.entries(events)) {
    if (!tool) continue;
    const dot = document.createElement('span');
    dot.className = 'gate-dot ' + (ev.exit_code === 0 ? 'pass' : 'fail');
    dot.textContent = '\u25CF ' + tool;
    dot.title = ev.summary || '';
    gatesEl.appendChild(dot);
  }

  // Update last event
  let lastEl = card.querySelector('.ac-last-event');
  const allEvents = Object.values(events);
  if (allEvents.length > 0) {
    const latest = allEvents[allEvents.length - 1];
    if (!lastEl) {
      lastEl = document.createElement('div');
      lastEl.className = 'ac-last-event';
      card.appendChild(lastEl);
    }
    lastEl.textContent = 'Last: ' + (latest.summary || '') + ' \u00B7 just now';
  }
}

// ═══════════ Load Historical Hook Events on Init ═══════════
async function loadHistoricalHookEvents() {
  try {
    for (const agent of agentRoster) {
      const res = await fetch(`/api/agents/${agent.name}/hook-events?limit=50`);
      if (!res.ok) continue;
      const data = await res.json();
      if (!agentHookEvents[agent.name]) agentHookEvents[agent.name] = {};
      // Events are newest-first; process oldest-first so latest wins
      for (const ev of (data.events || []).reverse()) {
        if (ev.tool) {
          agentHookEvents[agent.name][ev.tool] = {
            exit_code: ev.exit_code,
            summary: ev.summary,
            timestamp: ev.timestamp
          };
        }
      }
      updateAgentGateStatus(agent.name);
    }
  } catch (e) {
    console.warn('Failed to load historical hook events:', e);
  }
}

// ═══════════ Gates Dashboard ═══════════
async function loadGatesDashboard() {
  const grid = document.getElementById('gatesGrid');
  if (!grid) return;

  try {
    const res = await fetch('/api/hooks/events/all?limit=200');
    const data = await res.json();
    const events = data.events || [];

    // Group by tool, get latest status per tool
    const toolStatus = {};
    events.forEach(ev => {
      if (!ev.tool) return;
      const key = ev.tool;
      if (!toolStatus[key] || ev.timestamp > toolStatus[key].timestamp) {
        toolStatus[key] = ev;
      }
    });

    // Build gate cards grouped by gate naming convention
    const gates = {
      'Gate 1: Deterministic': ['pytest', 'flake8', 'mypy', 'bandit', 'pip-audit', 'coverage', 'secret-scan'],
      'Gate 2: Integration': ['flyctl-deploy', 'health-poll', 'sentry-check'],
      'Gate 3: AI Review': ['greptile', 'coderabbit-cli', 'claude-review'],
    };

    while (grid.firstChild) grid.removeChild(grid.firstChild);
    for (const [gateName, tools] of Object.entries(gates)) {
      const card = document.createElement('div');
      // Determine overall gate status for glow color
      const toolStatuses = tools.map(t => toolStatus[t]);
      const anyFail = toolStatuses.some(s => s && s.exit_code !== 0);
      const allRun = toolStatuses.every(s => s);
      const gateState = anyFail ? 'gate-fail' : (allRun ? 'gate-pass' : '');
      card.className = 'gate-card ' + gateState;

      const titleEl = document.createElement('div');
      titleEl.className = 'gate-card-title';
      titleEl.textContent = gateName;
      card.appendChild(titleEl);

      tools.forEach(tool => {
        const ev = toolStatus[tool];
        let statusClass = 'pending';
        let statusText = '\u2014';
        if (ev) {
          statusClass = ev.exit_code === 0 ? 'pass' : 'fail';
          statusText = ev.exit_code === 0 ? 'PASS' : 'FAIL';
        }
        const row = document.createElement('div');
        row.className = 'gate-tool-row';
        const nameSpan = document.createElement('span');
        nameSpan.className = 'gate-tool-name';
        nameSpan.textContent = tool;
        const statusSpan = document.createElement('span');
        statusSpan.className = 'gate-tool-status ' + statusClass;
        statusSpan.textContent = statusText;
        row.appendChild(nameSpan);
        row.appendChild(statusSpan);
        card.appendChild(row);
      });

      grid.appendChild(card);
    }
  } catch (err) {
    while (grid.firstChild) grid.removeChild(grid.firstChild);
    const errDiv = document.createElement('div');
    errDiv.style.color = 'var(--text-secondary)';
    errDiv.textContent = 'Failed to load gate data';
    grid.appendChild(errDiv);
  }
}

// ═══════════ Send ═══════════
let _lastSendTime = 0;
function send() {
  // Debounce: prevent double-tap / double-fire within 500ms
  const now = Date.now();
  if (now - _lastSendTime < 500) return;
  _lastSendTime = now;

  let text = $input.value.trim();
  const chipEl = $('attachChip');
  const attachPath = chipEl ? chipEl.dataset.path : '';
  if (attachPath) {
    text = (text ? text + ' ' : '') + `[uploaded: ${attachPath}]`;
  }
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ sender: 'gurvinder', target: $target.value, content: text, type: 'message' }));
  renderMsg({ sender: 'gurvinder', target: $target.value, content: text, type: 'message', timestamp: new Date().toISOString() });
  scrollEnd();
  $input.value = '';
  $input.style.height = 'auto';
  $target.value = 'all';
  // Clear attachment chip
  if (chipEl) { chipEl.style.display = 'none'; chipEl.dataset.path = ''; }
  updateSendVisibility();
}

function scrollEnd() {
  // Only auto-scroll if user is near the bottom (within 150px)
  const nearBottom = ($msgs.scrollHeight - $msgs.scrollTop - $msgs.clientHeight) < 150;
  if (nearBottom) {
    $msgs.scrollTop = $msgs.scrollHeight;
  }
}

function scrollForce() {
  $msgs.scrollTop = $msgs.scrollHeight;
}

// ═══════════ Events ═══════════
function updateSendVisibility() {
  const hasText = $input.value.trim().length > 0;
  const hasAttachment = $('attachChip') && $('attachChip').style.display !== 'none';
  if (hasText || hasAttachment) {
    $send.classList.add('visible');
    $send.disabled = false;
  } else {
    $send.classList.remove('visible');
    $send.disabled = true;
  }
}

$input.addEventListener('input', () => {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 88) + 'px';
  updateSendVisibility();
});
$input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
$send.addEventListener('click', send);

// ═══════════ Dynamic scroll padding (mobile) ═══════════
if (window.innerWidth < 768) {
  const inputBar = document.querySelector('.input-bar');
  const tabBar = document.querySelector('.tab-bar');

  function updateScrollPadding() {
    const inputH = inputBar ? inputBar.offsetHeight : 80;
    const tabH = tabBar ? tabBar.offsetHeight : 50;
    $msgs.style.paddingBottom = (inputH + tabH + 16) + 'px';
  }

  // Initial calculation
  updateScrollPadding();

  // Recalculate when input bar resizes (multi-line text, attachment chip)
  if (typeof ResizeObserver !== 'undefined' && inputBar) {
    new ResizeObserver(updateScrollPadding).observe(inputBar);
  }

  // Also recalculate when textarea resizes
  $input.addEventListener('input', () => {
    setTimeout(updateScrollPadding, 50);
  });
}

async function loadDirectory(path) {
  $dirList.innerHTML = '<div class="dir-browser-loading">Loading...</div>';
  try {
    const res = await fetch(`/api/browse?path=${encodeURIComponent(path)}`);
    const data = await res.json();
    if (data.error) {
      $dirList.innerHTML = `<div class="dir-browser-empty">${esc(data.error)}</div>`;
      return;
    }
    drawerBrowsePath = data.current;
    $dirCurrent.textContent = data.current.replace(/^\/Users\/[^/]+/, '~');
    $dirList.innerHTML = '';
    if (data.directories.length === 0) {
      $dirList.innerHTML = '<div class="dir-browser-empty">No subdirectories</div>';
    } else {
      data.directories.forEach(d => {
        const item = document.createElement('div');
        item.className = 'dir-browser-item';
        item.textContent = '\uD83D\uDCC1 ' + d.name;
        item.addEventListener('click', () => loadDirectory(d.path));
        $dirList.appendChild(item);
      });
    }
    // Store parent for up button
    $dirUp.dataset.parent = data.parent;
  } catch (err) {
    $dirList.innerHTML = '<div class="dir-browser-empty">Failed to load</div>';
  }
}

// ─── Launch agent ───
$btnLaunch.addEventListener('click', async () => {
  $drawerErr.classList.remove('show');
  $drawerErr.textContent = '';

  const name = $dName.value.trim().replace(/-$/, '');
  const role = $dRole.value.trim();
  const directory = drawerSelectedDir;

  // Validation
  if (!name || name.length < 2) {
    showDrawerError('Agent name must be at least 2 characters');
    return;
  }
  if (!/^[a-z0-9][a-z0-9\-]{0,18}[a-z0-9]$/.test(name)) {
    showDrawerError('Name must be 2-20 chars, lowercase alphanumeric + hyphens');
    return;
  }
  if (!directory) {
    showDrawerError('Select a working directory');
    return;
  }
  if (!role) {
    showDrawerError('Role is required');
    return;
  }

  $btnLaunch.disabled = true;
  $btnLaunch.textContent = 'CREATING...';

  const roleType = $dRoleType ? $dRoleType.value : 'other';
  const preset = ROLE_PRESETS[roleType];
  const instructions = preset ? preset.instructions : '';

  try {
    const res = await fetch('/api/agents/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: name,
        directory: directory,
        role: role,
        role_type: roleType,
        instructions: instructions,
        initial_prompt: $dPrompt.value.trim(),
        model: $dModel.value,
        skip_permissions: $dSkipPerms.checked,
        color: selectedColor,
        icon: selectedIcon,
      }),
    });

    const data = await res.json();

    if (!res.ok) {
      showDrawerError(data.error || 'Failed to create agent');
      $btnLaunch.disabled = false;
      $btnLaunch.textContent = 'LAUNCH AGENT';
      return;
    }

    // Success — the agent_created WS event will update the sidebar
    // Also add locally in case WS event arrives late
    if (!agentRoster.find(x => x.name === name)) {
      agentRoster.push({ name: name, role: role, dynamic: true });
    }
    agentData[name] = {
      presence: data.agent?.presence || 'active',
      activity: data.agent?.activity || null,
      in_room: true,
      dynamic: true,
    };
    renderAgents();

    // Add to target dropdown
    if (!Array.from($target.options).find(o => o.value === name)) {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = `@${name}`;
      $target.appendChild(opt);
    }

    closeDrawer();
  } catch (err) {
    showDrawerError('Network error: ' + err.message);
    $btnLaunch.disabled = false;
    $btnLaunch.textContent = 'LAUNCH AGENT';
  }
});

  $drawerErr.classList.add('show');
}

// ═══════════ File Browser ═══════════
const $fileTree = $('fileTree');
const $fpPath = $('fpPath');

async function loadDir(path, depth, parentEl, autoExpand) {
  try {
    const resp = await fetch(`/api/files?path=${encodeURIComponent(path)}`);
    if (!resp.ok) return;
    const data = await resp.json();

    if (depth === 0) {
      $fpPath.textContent = data.current === '.' ? 'project root' : data.current;
    }

    data.entries.forEach(entry => {
      const item = document.createElement('div');
      item.dataset.depth = depth;
      item.dataset.path = entry.path;
      item.dataset.type = entry.type;

      if (entry.type === 'dir') {
        item.className = 'fp-item dir';
        const isExpanded = autoExpand && depth === 0;
        item.innerHTML = `
          <span class="fp-arrow">${isExpanded ? '▾' : '▸'}</span>
          <span class="fp-name">${esc(entry.name)}</span>
        `;
        parentEl.appendChild(item);

        const children = document.createElement('div');
        children.style.display = isExpanded ? '' : 'none';
        parentEl.appendChild(children);

        if (isExpanded) {
          loadDir(entry.path, depth + 1, children, true);
        }

        item.onclick = (e) => {
          e.stopPropagation();
          const arrow = item.querySelector('.fp-arrow');
          if (children.style.display === 'none') {
            children.style.display = '';
            arrow.textContent = '▾';
            if (!children.hasChildNodes()) {
              loadDir(entry.path, depth + 1, children, false);
            }
          } else {
            children.style.display = 'none';
            arrow.textContent = '▸';
          }
        };

      } else {
        item.className = 'fp-item file';
        item.draggable = true;
        item.innerHTML = `<span class="fp-name">${esc(entry.name)}</span>`;

        item.onclick = (e) => {
          e.stopPropagation();
          if (window.innerWidth < 768) {
            const actions = [
              { icon: SVG_ICONS.copy, label: 'Copy path', action: 'copy' },
              { icon: SVG_ICONS.chat, label: 'Send to chat', action: 'chat' },
              { icon: SVG_ICONS.user, label: 'Assign to agent...', action: 'assign' },
            ];
            if (entry.name.match(/\.(md|markdown)$/i)) {
              actions.push({ icon: SVG_ICONS.eye, label: 'Preview', action: 'preview' });
            }
            showBottomSheet(entry.name, actions, (act) => {
              if (act.action === 'copy') {
                navigator.clipboard.writeText(entry.path).then(() => {
                  // Brief visual feedback
                }).catch(() => {});
              } else if (act.action === 'chat') {
                $input.value += entry.path + ' ';
                switchTab('chat');
                $input.focus();
              } else if (act.action === 'assign') {
                const agents = agentRoster.map(a => ({ label: `@${a.name}`, value: a.name, icon: SVG_ICONS.user }));
                showBottomSheet('Assign to...', agents, (agent) => {
                  $target.value = agent.value;
                  if ($inputTarget) $inputTarget.textContent = `@${agent.value} ▼`;
                  $input.value = `[file: ${entry.path}] `;
                  switchTab('chat');
                  $input.focus();
                });
              } else if (act.action === 'preview') {
                fetch('/api/files/open', {
                  method: 'POST',
                  headers: {'Content-Type': 'application/json'},
                  body: JSON.stringify({path: entry.path}),
                }).then(r => r.json()).then(d => {
                  if (d.url) window.open(d.url, '_blank');
                });
              }
            });
          } else {
            fetch('/api/files/open', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({path: entry.path}),
            }).then(r => r.json()).then(d => {
              if (d.status === 'preview' && d.url) {
                window.open(d.url, '_blank');
              }
            }).catch(() => {});
          }
        };

        item.ondragstart = (e) => {
          e.dataTransfer.setData('text/plain', entry.path);
          e.dataTransfer.setData('application/x-warroom-file', entry.path);
          item.classList.add('dragging');
        };
        item.ondragend = () => item.classList.remove('dragging');

        parentEl.appendChild(item);
      }
    });
  } catch (e) {
    console.error('File tree error:', e);
  }
}

    e.preventDefault();

  }
});

  $input.classList.remove('drop-active');
});

$input.addEventListener('drop', (e) => {
  e.preventDefault();
  $input.classList.remove('drop-active');
  const filePath = e.dataTransfer.getData('application/x-warroom-file');
  if (filePath) {
    const start = $input.selectionStart;
    const before = $input.value.slice(0, start);
    const after = $input.value.slice(start);
    $input.value = before + filePath + ' ' + after;
    $input.focus();
    $input.selectionStart = $input.selectionEnd = start + filePath.length + 1;
  }
});

// ═══════════ Server Buttons ═══════════
$('srvRestart').onclick = async () => {
  if (!confirm('Restart the server? Agents keep running but dispatch pauses briefly.')) return;
  try { await fetch('/api/server/restart', { method: 'POST' }); } catch (e) {}
  $('srvRestart').textContent = 'Restarting...';
  setTimeout(() => { $('srvRestart').textContent = 'Restart'; }, 5000);
};

$('srvLogs').onclick = () => { window.open('/api/server/logs', '_blank'); };

// ═══════════ Roll Call ═══════════
$('rollCallBtn').onclick = async () => {
  const btn = $('rollCallBtn');
  btn.textContent = 'Calling...';
  btn.disabled = true;
  try {
    const resp = await fetch('/api/roll-call', { method: 'POST' });
    const data = await resp.json();
    btn.textContent = `${data.responded.length}/${data.total} alive`;
    setTimeout(() => { btn.textContent = 'Roll Call'; btn.disabled = false; }, 5000);
  } catch (e) {
    btn.textContent = 'Roll Call';
    btn.disabled = false;
  }
};

  const gear = document.createElement('button');
  gear.id = 'mobileSettings';
  gear.className = 'server-btn';
  gear.textContent = '⚙';
  gear.style.cssText = 'display:none;font-size:14px;padding:4px 8px';
  gear.onclick = () => {

      showBottomSheet('Server', [

// ═══════════ Mobile Tab Navigation ═══════════
let activeTab = 'chat';

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  const sidebar = document.querySelector('.sidebar');
  const chat = document.querySelector('.chat');
  const filePanel = document.querySelector('.file-panel');
  const gatesPanel = document.getElementById('gatesPanel');

  sidebar.classList.remove('mobile-active');
  chat.classList.remove('mobile-hidden');
  filePanel.classList.remove('mobile-active');
  if (gatesPanel) gatesPanel.classList.remove('mobile-active');

  if (tab === 'agents') {
    sidebar.classList.add('mobile-active');
    chat.classList.add('mobile-hidden');
  } else if (tab === 'files') {
    filePanel.classList.add('mobile-active');
    chat.classList.add('mobile-hidden');
  } else if (tab === 'gates') {
    if (gatesPanel) gatesPanel.classList.add('mobile-active');
    chat.classList.add('mobile-hidden');
    loadGatesDashboard();
  }
}

const $tabBar = $('tabBar');
if ($tabBar) {
  $tabBar.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => switchTab(tab.dataset.tab);
  });
}

// ═══════════ Bottom Sheets ═══════════
function showBottomSheet(title, items, onSelect) {
  document.querySelectorAll('.bottom-sheet, .bottom-sheet-overlay').forEach(el => el.remove());

  const overlay = document.createElement('div');
  overlay.className = 'bottom-sheet-overlay open';

  const sheet = document.createElement('div');
  sheet.className = 'bottom-sheet';

  let html = `<div class="bs-title">${title}</div>`;
  items.forEach((item, i) => {
    const iconHtml = item.icon ? `<span class="bs-icon">${item.icon}</span>` : '';
    html += `<div class="bs-item" data-index="${i}">${iconHtml}<span>${item.label}</span></div>`;
  });
  html += `<div class="bs-cancel">Cancel</div>`;
  sheet.innerHTML = html;

  document.body.appendChild(overlay);
  document.body.appendChild(sheet);

  requestAnimationFrame(() => sheet.classList.add('open'));

  const close = () => {
    sheet.classList.remove('open');
    overlay.classList.remove('open');
    setTimeout(() => { sheet.remove(); overlay.remove(); }, 250);
  };

  overlay.onclick = close;
  sheet.querySelector('.bs-cancel').onclick = close;
  sheet.querySelectorAll('.bs-item').forEach(el => {
    el.onclick = () => {
      const idx = parseInt(el.dataset.index);
      close();
      if (onSelect) onSelect(items[idx], idx);
    };
  });
}

// ═══════════ Mobile: Attachment ═══════════
const $attachBtn = $('attachBtn');
if ($attachBtn) {
  $attachBtn.onclick = () => {
    showBottomSheet('Attach', [
      { icon: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>', label: 'Photo', action: 'photo' },
      { icon: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>', label: 'Upload File', action: 'file' },
      { icon: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>', label: 'Project File', action: 'project' },
    ], (item) => {
      if (item.action === 'photo' || item.action === 'file') {
        const inp = document.createElement('input');
        inp.type = 'file';
        if (item.action === 'photo') inp.accept = 'image/*';
        inp.onchange = async () => {
          const f = inp.files[0];
          if (!f) return;
          const fd = new FormData();
          fd.append('file', f);
          try {
            const resp = await fetch('/api/files/upload', { method: 'POST', body: fd });
            const data = await resp.json();
            if (data.path) {
              // Show attachment chip instead of inline text
              const chipEl = $('attachChip');
              const nameEl = $('attachName');
              if (chipEl && nameEl) {
                const fname = data.filename || data.path.split('/').pop();
                nameEl.textContent = '📄 ' + (fname.length > 25 ? fname.slice(0, 22) + '...' : fname);
                chipEl.style.display = 'flex';
                chipEl.dataset.path = data.path;
                updateSendVisibility();
              }
              $input.focus();
            }
          } catch (e) { alert('Upload failed'); }
        };
        inp.click();
      } else if (item.action === 'project') {
        showProjectFilePicker();
      }
    });
  };
}

// Attachment chip remove
const $attachRemove = $('attachRemove');
if ($attachRemove) {
  $attachRemove.onclick = () => {
    const chipEl = $('attachChip');
    if (chipEl) {
      chipEl.style.display = 'none';
      chipEl.dataset.path = '';
    }
    updateSendVisibility();
    $input.focus();
  };
}

async function showProjectFilePicker(path) {
  path = path || '.';
  try {
    const resp = await fetch(`/api/files?path=${encodeURIComponent(path)}`);
    const data = await resp.json();
    const items = [];
    if (data.parent != null) {
      items.push({ icon: SVG_ICONS.back, label: '.. (back)', action: 'navigate', path: data.parent });
    }
    data.entries.forEach(e => {
      if (e.type === 'dir') {
        items.push({ icon: SVG_ICONS.folder, label: e.name, action: 'navigate', path: e.path });
      } else {
        items.push({ icon: SVG_ICONS.file, label: e.name, action: 'select', path: e.path });
      }
    });
    showBottomSheet(`📂 ${data.current === '.' ? 'project root' : data.current}`, items, (item) => {
      if (item.action === 'navigate') {
        showProjectFilePicker(item.path);
      } else if (item.action === 'select') {
        $input.value += `[file: ${item.path}] `;
        $input.focus();
        if (window.innerWidth < 768) switchTab('chat');
      }
    });
  } catch (e) { alert('Failed to load files'); }
}

// ═══════════ Init ═══════════
fetch('/api/agents').then(r => r.json()).then(agents => {
  agentRoster = agents;
  agents.forEach(a => { agentData[a.name] = { presence: a.presence || 'offline', activity: a.activity || null, in_room: a.in_room !== false, dynamic: a.dynamic || false }; });
  // Restore saved order from localStorage
  const savedOrder = localStorage.getItem('warroom-agent-order');
  if (savedOrder) {
    try {
      const order = JSON.parse(savedOrder);
      agentRoster.sort((a, b) => {
        const ai = order.indexOf(a.name);
        const bi = order.indexOf(b.name);
        if (ai === -1 && bi === -1) return 0;
        if (ai === -1) return 1;
        if (bi === -1) return -1;
        return ai - bi;
      });
    } catch(e) {}
  }
  renderAgents();
  // Fetch historical hook events so agent cards show gate status on load
  loadHistoricalHookEvents();
}).catch(() => {});
connect();

// ═══════════ Drag-and-Drop File Upload ═══════════
(function initDragDrop() {
  const composeArea = document.getElementById('msgInput');
  if (!composeArea) return;

  composeArea.addEventListener('dragover', (e) => {
    if (e.dataTransfer.types.includes('Files')) {
      e.preventDefault();
      composeArea.classList.add('drag-active');
    }
  });

  composeArea.addEventListener('dragleave', () => {
    composeArea.classList.remove('drag-active');
  });

  composeArea.addEventListener('drop', async (e) => {
    if (!e.dataTransfer.files.length) return;
    e.preventDefault();
    composeArea.classList.remove('drag-active');

    for (const file of e.dataTransfer.files) {
      const formData = new FormData();
      formData.append('file', file);

      try {
        const res = await fetch('/api/files/upload', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.filename) {
          addFilePill(data.filename, file.type);
        }
      } catch (err) {
        console.error('Upload failed:', err);
      }
    }
  });
})();

function addFilePill(filename, mimeType) {
  let container = document.getElementById('filePills');
  if (!container) {
    container = document.createElement('div');
    container.id = 'filePills';
    container.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;';
    const composeParent = document.getElementById('msgInput').parentElement;
    composeParent.insertBefore(container, composeParent.firstChild);
  }

  const pill = document.createElement('span');
  pill.className = 'file-pill';
  const icon = mimeType && mimeType.startsWith('image/') ? '\uD83D\uDDBC' : '\uD83D\uDCC4';
  const removeSpan = document.createElement('span');
  removeSpan.style.cssText = 'cursor:pointer;margin-left:4px';
  removeSpan.textContent = '\u00D7';
  removeSpan.onclick = function() { this.parentElement.remove(); };
  pill.textContent = icon + ' ' + filename + ' ';
  pill.appendChild(removeSpan);
  container.appendChild(pill);
}
</script>
