<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>War Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0c10;
    --bg-panel: #0f1218;
    --bg-card: #141920;
    --bg-hover: #1a2030;
    --border: #1e2736;
    --border-bright: #2a3548;
    --text-primary: #d4dae4;
    --text-secondary: #6b7a8d;
    --text-dim: #3d4a5c;
    --accent-green: #00e676;
    --accent-yellow: #ffd740;
    --accent-orange: #ff9100;
    --accent-red: #ff5252;
    --accent-blue: #448aff;
    --accent-purple: #b388ff;
    --accent-pink: #ff80ab;
    --accent-cyan: #18ffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ═══════════════ HEADER ═══════════════ */
  header {
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent-green);
    text-shadow: 0 0 20px rgba(0,230,118,0.15);
  }

  .header-divider {
    width: 1px;
    height: 16px;
    background: var(--border-bright);
  }

  .header-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .conn-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 12px;
    border-radius: 3px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .conn-badge.on {
    color: var(--accent-green);
    background: rgba(0,230,118,0.08);
    border: 1px solid rgba(0,230,118,0.2);
  }

  .conn-badge.off {
    color: var(--accent-red);
    background: rgba(255,82,82,0.08);
    border: 1px solid rgba(255,82,82,0.2);
    animation: pulse-red 2s ease-in-out infinite;
  }

  @keyframes pulse-red {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* ═══════════════ MAIN LAYOUT ═══════════════ */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ═══════════════ SIDEBAR ═══════════════ */
  .sidebar {
    width: 260px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }

  .agent-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .agent-card {
    padding: 10px 12px;
    border-radius: 6px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .agent-card:hover { background: var(--bg-hover); }

  .agent-card.deboarded {
    opacity: 0.35;
  }

  .agent-card-top {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .presence-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: all 0.3s;
  }

  .presence-dot.active {
    background: var(--accent-green);
    box-shadow: 0 0 6px rgba(0,230,118,0.4);
  }

  .presence-dot.busy {
    background: var(--accent-yellow);
    box-shadow: 0 0 6px rgba(255,215,64,0.3);
    animation: spin-busy 1.5s linear infinite;
  }

  .presence-dot.typing {
    background: var(--accent-cyan);
    box-shadow: 0 0 6px rgba(24,255,255,0.3);
    animation: pulse-type 1s ease-in-out infinite;
  }

  .presence-dot.session {
    background: var(--text-dim);
  }

  .presence-dot.offline {
    background: var(--accent-red);
    opacity: 0.4;
  }

  @keyframes spin-busy {
    0% { box-shadow: 0 0 4px rgba(255,215,64,0.2); }
    50% { box-shadow: 0 0 8px rgba(255,215,64,0.5); }
    100% { box-shadow: 0 0 4px rgba(255,215,64,0.2); }
  }

  @keyframes pulse-type {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
  }

  .agent-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    flex: 1;
  }

  .agent-board-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid var(--border-bright);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s, border-color 0.15s;
  }

  .agent-card:hover .agent-board-btn { opacity: 1; }

  .agent-board-btn:hover {
    color: var(--accent-red);
    border-color: var(--accent-red);
  }

  .agent-board-btn.reboard:hover {
    color: var(--accent-green);
    border-color: var(--accent-green);
  }

  .agent-meta {
    margin-top: 4px;
    padding-left: 18px;
    font-size: 10px;
    line-height: 1.4;
  }

  .agent-role {
    color: var(--text-secondary);
  }

  .agent-activity {
    color: var(--accent-yellow);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .agent-activity.typing { color: var(--accent-cyan); }

  /* ═══════════════ CHAT ═══════════════ */
  .chat {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg-deep);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
  }

  .msg {
    margin-bottom: 10px;
    padding: 8px 14px;
    border-radius: 6px;
    background: var(--bg-card);
    border-left: 3px solid var(--border);
    animation: msg-in 0.2s ease-out;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.direct {
    background: rgba(255,145,0,0.05);
    border-left-color: var(--accent-orange);
  }

  .msg.system {
    background: transparent;
    border-left: none;
    color: var(--text-dim);
    font-style: italic;
    font-size: 11px;
    padding: 3px 14px;
    animation: none;
  }

  .msg-head {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 3px;
  }

  .msg-sender {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 12px;
  }

  .msg-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent-orange);
    background: rgba(255,145,0,0.1);
    padding: 1px 6px;
    border-radius: 3px;
  }

  .msg-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }

  .msg-body {
    font-size: 13px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text-primary);
  }

  /* ═══════════════ INPUT ═══════════════ */
  .input-bar {
    background: var(--bg-panel);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .target-sel {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--bg-deep);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 8px 10px;
    border-radius: 4px;
    cursor: pointer;
  }

  .target-sel:focus { border-color: var(--accent-blue); outline: none; }

  .msg-input {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    background: var(--bg-deep);
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 8px 14px;
    border-radius: 4px;
    resize: none;
    min-height: 38px;
    max-height: 120px;
  }

  .msg-input:focus { border-color: var(--accent-blue); outline: none; }
  .msg-input::placeholder { color: var(--text-dim); }

  .send-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--accent-green);
    color: var(--bg-deep);
    border: none;
    padding: 9px 20px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .send-btn:hover { box-shadow: 0 0 12px rgba(0,230,118,0.3); }
  .send-btn:disabled { background: var(--border); color: var(--text-dim); box-shadow: none; cursor: default; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="header-logo">War Room</span>
    <span class="header-divider"></span>
    <span class="header-subtitle">North Star Daemon</span>
  </div>
  <span id="connBadge" class="conn-badge off">offline</span>
</header>

<div class="main">
  <aside class="sidebar">
    <div class="sidebar-header">Agents</div>
    <div id="agentList" class="agent-list"></div>
  </aside>

  <div class="chat">
    <div id="messages" class="messages"></div>
    <div class="input-bar">
      <select id="targetSel" class="target-sel"><option value="all">@all</option></select>
      <textarea id="msgInput" class="msg-input" placeholder="Message the war room..." rows="1"></textarea>
      <button id="sendBtn" class="send-btn" disabled>Send</button>
    </div>
  </div>
</div>

<script>
const COLORS = {
  'gurvinder':  '#ff9100',
  'supervisor': '#b388ff',
  'phase-1':    '#448aff',
  'phase-2':    '#00e676',
  'phase-3':    '#ff80ab',
  'phase-4':    '#18ffff',
  'phase-5':    '#ea80fc',
  'phase-6':    '#69f0ae',
  'git-agent':  '#ffd740',
};

const color = n => COLORS[n] || '#6b7a8d';
const esc = t => { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };

let ws = null;
let agentData = {};      // name -> {presence, activity, in_room}
let agentRoster = [];    // from /api/agents

const $msgs = document.getElementById('messages');
const $input = document.getElementById('msgInput');
const $send = document.getElementById('sendBtn');
const $target = document.getElementById('targetSel');
const $conn = document.getElementById('connBadge');
const $agents = document.getElementById('agentList');

// ═══════════════ WebSocket ═══════════════
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);

  ws.onopen = () => {
    $conn.textContent = 'live';
    $conn.className = 'conn-badge on';
    $send.disabled = false;
  };

  ws.onclose = () => {
    $conn.textContent = 'offline';
    $conn.className = 'conn-badge off';
    $send.disabled = true;
    setTimeout(connect, 2000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);
    if (d.type === 'history') {
      $msgs.innerHTML = '';
      d.messages.forEach(renderMsg);
      scrollEnd();
    } else if (d.type === 'message') {
      renderMsg(d.message);
      scrollEnd();
    } else if (d.type === 'agent_status') {
      // New format: d.agents = {name: {presence, activity, in_room}}
      agentData = d.agents || {};
      renderAgents();
    } else if (d.type === 'membership') {
      if (agentData[d.agent]) {
        agentData[d.agent].in_room = d.in_room;
      }
      renderAgents();
    }
  };
}

// ═══════════════ Messages ═══════════════
function renderMsg(m) {
  const el = document.createElement('div');
  const cls = m.type === 'system' ? 'msg system' : m.target !== 'all' ? 'msg direct' : 'msg';
  el.className = cls;

  if (m.type === 'system') {
    el.textContent = m.content;
  } else {
    const ts = m.timestamp ? m.timestamp.slice(11, 19) : '';
    const tag = m.target !== 'all' ? `<span class="msg-tag">@${esc(m.target)}</span>` : '';
    el.innerHTML = `
      <div class="msg-head">
        <span class="msg-sender" style="color:${color(m.sender)}">${esc(m.sender)}</span>
        ${tag}
        <span class="msg-time">${ts}</span>
      </div>
      <div class="msg-body">${esc(m.content)}</div>
    `;
  }
  $msgs.appendChild(el);
}

// ═══════════════ Agent Sidebar ═══════════════
function shortRole(role) {
  if (!role) return '';
  const m = role.match(/^Phase \d+[AB]?:\s*([^—–\-\.]+)/);
  return m ? m[1].trim() : '';
}

function renderAgents() {
  $agents.innerHTML = '';

  // Gurvinder
  $agents.innerHTML += `
    <div class="agent-card" onclick="document.getElementById('targetSel').value='all';document.getElementById('msgInput').focus()">
      <div class="agent-card-top">
        <span class="presence-dot active"></span>
        <span class="agent-name" style="color:${color('gurvinder')}">gurvinder</span>
      </div>
    </div>
  `;

  agentRoster.forEach(a => {
    const d = agentData[a.name] || {};
    const presence = d.presence || 'offline';
    const activity = d.activity || null;
    const inRoom = d.in_room !== undefined ? d.in_room : true;
    const role = shortRole(a.role);
    const deboarded = !inRoom;

    const btnLabel = deboarded ? 'reboard' : 'deboard';
    const btnClass = deboarded ? 'agent-board-btn reboard' : 'agent-board-btn';
    const cardClass = deboarded ? 'agent-card deboarded' : 'agent-card';
    const dotClass = deboarded ? 'presence-dot session' : `presence-dot ${presence}`;

    let activityHtml = '';
    if (deboarded) {
      activityHtml = '<div class="agent-activity" style="color:var(--text-dim)">de-boarded</div>';
    } else if (activity) {
      const actClass = presence === 'typing' ? 'agent-activity typing' : 'agent-activity';
      activityHtml = `<div class="${actClass}">${esc(activity)}</div>`;
    }

    const card = document.createElement('div');
    card.className = cardClass;
    card.innerHTML = `
      <div class="agent-card-top">
        <span class="${dotClass}"></span>
        <span class="agent-name" style="color:${color(a.name)}">${a.name}</span>
        <button class="${btnClass}" data-agent="${a.name}" data-action="${btnLabel}">${btnLabel}</button>
      </div>
      <div class="agent-meta">
        ${role ? `<div class="agent-role">${role}</div>` : ''}
        ${activityHtml}
      </div>
    `;

    // Click name -> set target
    card.querySelector('.agent-name').onclick = (e) => {
      e.stopPropagation();
      $target.value = a.name;
      $input.focus();
    };

    // Click deboard/reboard button
    card.querySelector('.agent-board-btn').onclick = (e) => {
      e.stopPropagation();
      const action = e.target.dataset.action;
      fetch(`/api/agents/${a.name}/${action}`, { method: 'POST' });
    };

    $agents.appendChild(card);
  });

  // Update target dropdown
  const cur = $target.value;
  $target.innerHTML = '<option value="all">@all</option>';
  agentRoster.forEach(a => {
    const opt = document.createElement('option');
    opt.value = a.name;
    opt.textContent = `@${a.name}`;
    $target.appendChild(opt);
  });
  $target.value = cur || 'all';
}

// ═══════════════ Send ═══════════════
function send() {
  const text = $input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  ws.send(JSON.stringify({
    sender: 'gurvinder',
    target: $target.value,
    content: text,
    type: 'message',
  }));

  renderMsg({
    sender: 'gurvinder',
    target: $target.value,
    content: text,
    type: 'message',
    timestamp: new Date().toISOString(),
  });
  scrollEnd();

  $input.value = '';
  $input.style.height = 'auto';
  $target.value = 'all';
}

function scrollEnd() { $msgs.scrollTop = $msgs.scrollHeight; }

// ═══════════════ Events ═══════════════
$input.addEventListener('input', () => {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
});

$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

$send.addEventListener('click', send);

// ═══════════════ Init ═══════════════
fetch('/api/agents')
  .then(r => r.json())
  .then(agents => {
    agentRoster = agents;
    agents.forEach(a => {
      agentData[a.name] = {
        presence: a.presence || 'offline',
        activity: a.activity || null,
        in_room: a.in_room !== false,
      };
    });
    renderAgents();
  })
  .catch(() => {});
connect();
</script>
</body>
</html>
